<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="220" fill="none" stroke="rgba(99,102,241,0.12)" stroke-width="1.5"/>
  <circle cx="1050" cy="100" r="150" fill="none" stroke="rgba(99,102,241,0.1)" stroke-width="1"/>
  <circle cx="150" cy="530" r="180" fill="none" stroke="rgba(16,185,129,0.1)" stroke-width="1.5"/>

  <!-- Accent bar -->
  <rect x="80" y="280" width="6" height="80" rx="3" fill="url(#accent)" />

  <!-- SK logo block -->
  <rect x="80" y="80" width="64" height="64" rx="12" fill="#6366F1" />
  <text x="112" y="122" font-family="sans-serif" font-weight="700" font-size="24" fill="#fff" text-anchor="middle">SK</text>

  <!-- Name -->
  <text x="164" y="107" font-family="sans-serif" font-weight="700" font-size="22" fill="#F8FAFC">Snehal Kanzariya</text>
  <text x="164" y="130" font-family="sans-serif" font-size="15" fill="#94A3B8">Frontend Developer · Rajkot, India</text>

  <!-- Main headline -->
  <text x="80" y="230" font-family="sans-serif" font-weight="700" font-size="52" fill="#F8FAFC">I build websites that</text>
  <text x="80" y="295" font-family="sans-serif" font-weight="700" font-size="52" fill="#6366F1">bring customers</text>
  <text x="80" y="360" font-family="sans-serif" font-weight="700" font-size="52" fill="#F8FAFC">to your business.</text>

  <!-- Sub -->
  <text x="80" y="420" font-family="sans-serif" font-size="20" fill="#94A3B8">React · TypeScript · Astro · TailwindCSS · Claude AI</text>

  <!-- Pricing pill -->
  <rect x="80" y="460" width="380" height="44" rx="22" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
  <text x="270" y="487" font-family="sans-serif" font-weight="600" font-size="16" fill="#10B981" text-anchor="middle">Starting at ₹15,000 · $199 international</text>

  <!-- URL -->
  <text x="80" y="580" font-family="sans-serif" font-size="16" fill="#475569">snehal.dev</text>
</svg>
